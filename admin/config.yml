backend:
  name: git-gateway
  branch: main

publish_mode: simple

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "posts"
    label: "글 (Posts)"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "날짜", name: "date", widget: "datetime" }
      - label: "카테고리"
        name: "categories"
        widget: "select"
        multiple: true
        options:
          - { label: "Spurs", value: "spurs" }
          - { label: "Lovers", value: "lovers" }
          - { label: "Memories", value: "memories" }
      - { label: "본문", name: "body", widget: "markdown" }

  - name: "links"
    label: "링크 (Links)"
    files:
      - name: "links"
        label: "링크 목록"
        file: "_data/links.yml"
        fields:
          - label: "Spurs"
            name: "spurs"
            widget: "list"
            default: []
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "설명", name: "description", widget: "string", required: false }
          - label: "Lovers"
            name: "lovers"
            widget: "list"
            default: []
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "설명", name: "description", widget: "string", required: false }
          - label: "Memories"
            name: "memories"
            widget: "list"
            default: []
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "설명", name: "description", widget: "string", required: false }

  - name: "photos"
    label: "사진 (Photos)"
    files:
      - name: "photos"
        label: "사진 목록"
        file: "_data/photos.yml"
        fields:
          - label: "Spurs"
            name: "spurs"
            widget: "list"
            default: []
            fields:
              - { label: "이미지", name: "src", widget: "image" }
              - { label: "대체 텍스트", name: "alt", widget: "string", required: false }
              - { label: "캡션", name: "caption", widget: "string", required: false }
          - label: "Lovers"
            name: "lovers"
            widget: "list"
            default: []
            fields:
              - { label: "이미지", name: "src", widget: "image" }
              - { label: "대체 텍스트", name: "alt", widget: "string", required: false }
              - { label: "캡션", name: "caption", widget: "string", required: false }
          - label: "Memories"
            name: "memories"
            widget: "list"
            default: []
            fields:
              - { label: "이미지", name: "src", widget: "image" }
              - { label: "대체 텍스트", name: "alt", widget: "string", required: false }
              - { label: "캡션", name: "caption", widget: "string", required: false }

  - name: "home"
    label: "홈 화면"
    files:
      - name: "home"
        label: "홈 배너"
        file: "_data/home.yml"
        fields:
          - { label: "배너 이미지", name: "banner", widget: "image", required: false, hint: "홈 화면 상단에 표시될 큰 이미지를 업로드하세요." }
          - label: "배너 이미지 위치"
            name: "banner_position"
            widget: "select"
            default: "center"
            hint: "이미지가 박스보다 클 경우, 어느 부분을 잘리지 않게 보여줄지 선택하세요."
            options:
              - { label: "중앙", value: "center" }
              - { label: "위", value: "top" }
              - { label: "아래", value: "bottom" }
              - { label: "좌측", value: "left" }
              - { label: "우측", value: "right" }

  - name: "icons"
    label: "카테고리 아이콘"
    files:
      - name: "icons"
        label: "아이콘 이미지"
        file: "_data/icons.yml"
        fields:
          - { label: "Spurs 아이콘", name: "spurs", widget: "image", required: false, hint: "비워두면 기본 이모지(⚽)가 표시됩니다." }
          - { label: "Lovers 아이콘", name: "lovers", widget: "image", required: false, hint: "비워두면 기본 이모지(💜)가 표시됩니다." }
          - { label: "Memories 아이콘", name: "memories", widget: "image", required: false, hint: "비워두면 기본 이모지(📷)가 표시됩니다." }
