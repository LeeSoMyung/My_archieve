<aside class="sidebar">
  <div class="sidebar-brand">
    <a class="sidebar-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <p class="sidebar-tagline">{{ site.tagline }}</p>
  </div>

  <nav class="sidebar-nav">
    <a class="sidebar-home{% if page.url == '/' %} active{% endif %}" href="{{ '/' | relative_url }}">Home</a>

    {% assign categories = "spurs,actors,memories" | split: "," %}
    {% for cat in categories %}
      <div class="nav-group nav-group--{{ cat }}">
        <a class="nav-group-title{% if page.category == cat and page.section == nil %} active{% endif %}" href="{{ '/' | append: cat | append: '/' | relative_url }}">
          <span class="nav-icon">
            {% case cat %}
              {% when 'spurs' %}⚽
              {% when 'actors' %}🎭
              {% when 'memories' %}📷
            {% endcase %}
          </span>
          {{ cat | capitalize }}
        </a>
        <div class="nav-sublinks">
          <a href="{{ '/' | append: cat | append: '/posts/' | relative_url }}"{% if page.category == cat and page.section == 'posts' %} class="active"{% endif %}>Posts</a>
          <a href="{{ '/' | append: cat | append: '/photos/' | relative_url }}"{% if page.category == cat and page.section == 'photos' %} class="active"{% endif %}>Photos</a>
          <a href="{{ '/' | append: cat | append: '/links/' | relative_url }}"{% if page.category == cat and page.section == 'links' %} class="active"{% endif %}>Links</a>
        </div>
      </div>
    {% endfor %}
  </nav>
</aside>
